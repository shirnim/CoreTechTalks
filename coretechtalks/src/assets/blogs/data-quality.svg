<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="400" fill="#F8FAFC"/>

  <!-- Background Analytics Chart -->
  <g opacity="0.6">
    <path d="M 550 320 L 750 320" stroke="#E2E8F0" stroke-width="2"/>
    <path d="M 550 100 L 550 320" stroke="#E2E8F0" stroke-width="2"/>
    <path d="M 580 280 L 620 220 L 660 250 L 700 180 L 740 200" fill="none" stroke="#C7D2FE" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="580" cy="280" r="5" fill="#A5B4FC"/>
    <circle cx="620" cy="220" r="5" fill="#A5B4FC"/>
    <circle cx="660" cy="250" r="5" fill="#A5B4FC"/>
    <circle cx="700" cy="180" r="5" fill="#A5B4FC"/>
    <circle cx="740" cy="200" r="5" fill="#A5B4FC"/>
  </g>

  <!-- Messy Data Pipeline (Left) -->
  <g>
    <path d="M 50 150 C 100 120, 150 180, 200 150" stroke="#94A3B8" stroke-width="15" fill="none" stroke-linecap="round"/>
    <path d="M 60 200 Q 120 240, 180 200" stroke="#94A3B8" stroke-width="8" fill="none" stroke-linecap="round"/>
    <path d="M 70 250 C 110 230, 160 280, 210 250" stroke="#94A3B8" stroke-width="12" fill="none" stroke-linecap="round"/>
    
    <circle cx="80" cy="180" r="5" fill="#64748B"/>
    <rect x="150" y="220" width="10" height="10" fill="#64748B" transform="rotate(45 150 220)"/>
    <circle cx="190" cy="270" r="3" fill="#64748B"/>
    <rect x="100" y="260" width="8" height="15" fill="#64748B"/>
  </g>

  <!-- Filter/Validation Layer (Center) -->
  <g>
    <path d="M 300 200 L 400 125 L 500 200 L 400 275 Z" fill="#fff" stroke="#8B5CF6" stroke-width="4"/>
    <path d="M 350 200 L 450 200" stroke="#C4B5FD" stroke-width="2"/>
    <path d="M 400 162.5 L 400 237.5" stroke="#C4B5FD" stroke-width="2"/>
    <path d="M 375 150 L 425 250" stroke="#C4B5FD" stroke-width="2" opacity="0.5"/>
    <path d="M 425 150 L 375 250" stroke="#C4B5FD" stroke-width="2" opacity="0.5"/>
  </g>

  <!-- Transitioning data -->
  <path d="M 220 200 C 270 200, 280 200, 300 200" stroke-dasharray="10 5" stroke="#A855F7" stroke-width="5" fill="none" stroke-linecap="round"/>

  <!-- Clean Data Pipeline (Right) -->
  <g>
    <path d="M 500 200 C 550 200, 600 200, 750 200" stroke="#3B82F6" stroke-width="6" fill="none" stroke-linecap="round"/>
    <circle cx="530" cy="200" r="10" fill="#60A5FA"/>
    <circle cx="570" cy="200" r="10" fill="#60A5FA"/>
    <circle cx="610" cy="200" r="10" fill="#60A5FA"/>
    <circle cx="650" cy="200" r="10" fill="#60A5FA"/>
    <circle cx="690" cy="200" r="10" fill="#60A5FA"/>
  </g>
</svg>
